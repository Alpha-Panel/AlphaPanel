anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
xferlog_enable=YES
xferlog_std_format=YES
connect_from_port_20=YES
chroot_local_user=YES
allow_writeable_chroot=YES
listen=YES
listen_ipv6=NO
pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010
seccomp_sandbox=NO
log_file=/dev/stdout
ftpd_banner=Welcome to AlphaPanel FTP (FTPS Required)
force_dot_files=YES

# ─── TLS / FTPS (Explicit FTPS on port 21) ─────────────────
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO
rsa_cert_file=/tmp/ftp-ssl/fullchain.pem
rsa_private_key_file=/tmp/ftp-ssl/privkey.pem
