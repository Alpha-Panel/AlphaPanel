ServerName "FTP Server"
ServerType standalone
DefaultServer on

# Logging (debug: geçici olarak açık, sorun çözülünce warn/0 yapılacak)
SyslogLevel info
DebugLevel 4

# Load modules
LoadModule mod_tls.c
LoadModule mod_sql.c
LoadModule mod_sql_mysql.c
LoadModule mod_ban.c

# Network
Port 21
PassivePorts %{env:FTP_PASSIVE_PORT_RANGE_START} %{env:FTP_PASSIVE_PORT_RANGE_END}
# MasqueradeAddress entrypoint tarafından otomatik ekleniyor (FTP_MASQUERADE_ADDRESS env'den)
UseIPv6 off

# Process
User proftpd_user
Group nogroup
Umask 022
MaxInstances 30

# Security
ShowSymlinks on
ServerIdent off
AllowEmptyPasswords off
AllowOverwrite on
ListOptions "-la"

# Timeouts
TimeoutIdle 600
TimeoutNoTransfer 600
TimeoutStalled 600
TimeoutLogin 300

# ── TLS Configuration ──────────────────────────────────────────
# Let's Encrypt issues EC (ECDSA) certs by default since 2024.
# ProFTPD requires TLSECCertificateFile for EC keys.
TLSEngine on
TLSLog /var/log/proftpd/tls.log
TLSProtocol TLSv1.2 TLSv1.3
TLSECCertificateFile %{env:FTP_TLS_CERTIFICATE_FILE}
TLSECCertificateKeyFile %{env:FTP_TLS_CERTIFICATE_KEY_FILE}
TLSRequired %{env:FTP_TLS_REQUIRED}
TLSOptions NoSessionReuseRequired

# ── Logging ────────────────────────────────────────────────────
SystemLog /var/log/proftpd/proftpd.log
TransferLog /var/log/proftpd/xferlog
ExtendedLog /var/log/proftpd/extended.log ALL default

# ── SQL Authentication ─────────────────────────────────────────
SQLBackend mysql
SQLEngine on
SQLAuthenticate users
SQLAuthTypes OpenSSL
SQLConnectInfo %{env:MYSQL_DATABASE}@%{env:MYSQL_HOST}:%{env:MYSQL_PORT} %{env:MYSQL_USER} %{env:MYSQL_PASSWORD}
SQLUserInfo %{env:FTP_SQL_USERS_TABLE} username password uid gid homedir shell
SQLMinUserUID 1000
SQLMinUserGID 1000

# ── Directory & Chroot ─────────────────────────────────────────
CreateHome on 755 dirmode 755
DefaultRoot ~
RequireValidShell off
AuthPAM off
RootRevoke off

# ── Disable Anonymous ──────────────────────────────────────────
<Anonymous ~ftp>
  User ftp
  Group nogroup
  UserAlias anonymous ftp
  <Limit LOGIN>
    DenyAll
  </Limit>
  <Limit ALL>
    DenyAll
  </Limit>
</Anonymous>

<Limit LOGIN>
  DenyUser ftp
  DenyUser anonymous
</Limit>

<Limit SITE_CHMOD>
  DenyAll
</Limit>

# ── IP Banning ─────────────────────────────────────────────────
<IfModule mod_ban.c>
  MaxLoginAttempts 5
  BanEngine on
  BanLog /var/log/proftpd/ban.log
  BanTable /var/ftp/ban.tab
  BanOnEvent MaxLoginAttempts 5/00:10:00 01:00:00
  BanOnEvent AnonRejectPasswords 1/00:00:01 99:99:99
  BanControlsACLs all allow user proftpd_user
  BanMessage "Host %a has been banned"
</IfModule>
