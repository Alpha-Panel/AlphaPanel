; 7.0 FPM
; [program:php7.0-fpm]
; command=/usr/sbin/php-fpm7.0 --nodaemonize --fpm-config /etc/php/7.0/fpm/php-fpm.conf
; autorestart=true
; stdout_logfile=/var/log/php7.0-fpm.log
; stderr_logfile=/var/log/php7.0-fpm.err

