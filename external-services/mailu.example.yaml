# ─────────────────────────────────────────────────────────────────────────────
# Mailu external-service include for AlphaPanel-Docker.
#
# MAIL_DATA_PATH is a HOST path (left side of the bind mount). Resolved by
# Docker Compose relative to the compose project root.
#
# Network topology:
#   - mailu_internal (fixed subnet 192.168.203.0/24): all Mailu containers
#     with short aliases (front, admin, redis, imap, smtp, antispam, webmail,
#     resolver). Resolver pinned at 192.168.203.254 so every container uses
#     it for DNS (DNSSEC validation is mandatory for Mailu admin).
#   - vhost_network: mailu-front (Caddy webmail/admin) + mailu-admin (panel API).
#
# TLS: cert files come from the panel's letsencrypt directory. Mailu reads
# /certs/cert.pem and /certs/key.pem. If the wildcard cert isn't issued yet,
# mailu-front falls back to TLS-off (the panel SSL renew job lays down certs
# automatically once the BASE_DOMAIN is in place).
# ─────────────────────────────────────────────────────────────────────────────

x-mailu-environment: &mailu-env
  DOMAIN: ${BASE_DOMAIN}
  HOSTNAMES: ${MAIL_HOSTNAME:-${MAIL_DOMAIN}}
  POSTMASTER: postmaster
  SECRET_KEY: ${MAIL_SECRET_KEY}
  SUBNET: 192.168.203.0/24
  TZ: ${APP_TIMEZONE:-Europe/Istanbul}

  ADMIN_ADDRESS: admin
  ANTISPAM_ADDRESS: antispam:11332
  ANTISPAM_WEBUI_ADDRESS: antispam:11334
  WEBMAIL_ADDRESS: webmail
  IMAP_ADDRESS: imap
  SMTP_ADDRESS: smtp
  REDIS_ADDRESS: redis
  FRONT_ADDRESS: front
  RESOLVER_ADDRESS: 192.168.203.254

  API: "true"
  API_TOKEN: ${MAIL_ADMIN_PASSWORD}

  TLS_FLAVOR: cert
  REAL_IP_HEADER: X-Real-IP
  REAL_IP_FROM: 0.0.0.0/0

  ADMIN: "true"
  WEBMAIL: ${MAIL_WEBMAIL:-snappymail}
  WEBDAV: "none"
  ANTIVIRUS: ${MAIL_ANTIVIRUS:-none}
  FETCHMAIL: "false"

  RELAYHOST: ${MAIL_RELAY_HOST:-}
  RELAYUSER: ${MAIL_RELAY_USERNAME:-}
  RELAYPASSWORD: ${MAIL_RELAY_PASSWORD:-}

  MESSAGE_SIZE_LIMIT: ${MAIL_MESSAGE_SIZE_LIMIT:-50000000}
  MESSAGE_RATELIMIT: 200/hour
  RECIPIENT_DELIMITER: "+"

  PUBLIC_IPV4: ${PUBLIC_NETWORK_IP}
  PUBLIC_IPV6:

  DB_FLAVOR: sqlite

  WEB_ADMIN: /admin
  WEB_WEBMAIL: /

  LOG_LEVEL: WARNING

  AUTH_RATELIMIT_IP: 60/hour
  AUTH_RATELIMIT_USER: 100/day

x-mailu-dns: &mailu-dns
  - 192.168.203.254

services:
  mailu-resolver:
    image: ghcr.io/mailu/unbound:2024.06
    container_name: mailu-resolver
    restart: always
    environment:
      <<: *mailu-env
    networks:
      mailu_internal:
        ipv4_address: 192.168.203.254
        aliases:
          - resolver

  mailu-redis:
    image: redis:alpine
    container_name: mailu-redis
    restart: always
    dns: *mailu-dns
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/redis:/data
    networks:
      mailu_internal:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      - mailu-resolver

  mailu-front:
    image: ghcr.io/mailu/nginx:2024.06
    container_name: mailu-front
    restart: always
    dns: *mailu-dns
    environment:
      <<: *mailu-env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${PUBLIC_NETWORK_IP}:25:25"
      - "${PUBLIC_NETWORK_IP}:465:465"
      - "${PUBLIC_NETWORK_IP}:587:587"
      - "${PUBLIC_NETWORK_IP}:993:993"
      - "${PUBLIC_NETWORK_IP}:995:995"
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/overrides/nginx:/overrides:ro
      - ./letsencrypt/live/${BASE_DOMAIN}/fullchain.pem:/certs/cert.pem:ro
      - ./letsencrypt/live/${BASE_DOMAIN}/privkey.pem:/certs/key.pem:ro
    networks:
      mailu_internal:
        aliases:
          - front
      vhost_network:
    depends_on:
      - mailu-resolver
      - mailu-redis

  mailu-admin:
    image: ghcr.io/mailu/admin:2024.06
    container_name: mailu-admin
    restart: always
    dns: *mailu-dns
    environment:
      <<: *mailu-env
      INITIAL_ADMIN_ACCOUNT: admin
      INITIAL_ADMIN_DOMAIN: ${BASE_DOMAIN}
      INITIAL_ADMIN_PW: ${MAIL_ADMIN_PASSWORD}
      INITIAL_ADMIN_MODE: ifmissing
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/data:/data
      - ${MAIL_DATA_PATH:-./mail-data}/dkim:/dkim
    networks:
      mailu_internal:
        aliases:
          - admin
      vhost_network:
    depends_on:
      - mailu-resolver
      - mailu-redis

  mailu-imap:
    image: ghcr.io/mailu/dovecot:2024.06
    container_name: mailu-imap
    restart: always
    dns: *mailu-dns
    environment:
      <<: *mailu-env
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/mail:/mail
      - ${MAIL_DATA_PATH:-./mail-data}/overrides/dovecot:/overrides:ro
    networks:
      mailu_internal:
        aliases:
          - imap
    depends_on:
      - mailu-front
      - mailu-redis

  mailu-smtp:
    image: ghcr.io/mailu/postfix:2024.06
    container_name: mailu-smtp
    restart: always
    dns: *mailu-dns
    environment:
      <<: *mailu-env
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/mailqueue:/queue
      - ${MAIL_DATA_PATH:-./mail-data}/overrides/postfix:/overrides:ro
    networks:
      mailu_internal:
        aliases:
          - smtp
    depends_on:
      - mailu-front
      - mailu-redis

  mailu-antispam:
    image: ghcr.io/mailu/rspamd:2024.06
    container_name: mailu-antispam
    restart: always
    dns: *mailu-dns
    environment:
      <<: *mailu-env
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/filter:/var/lib/rspamd
      - ${MAIL_DATA_PATH:-./mail-data}/overrides/rspamd:/overrides:ro
    networks:
      mailu_internal:
        aliases:
          - antispam
    depends_on:
      - mailu-front
      - mailu-redis

  mailu-webmail:
    image: ghcr.io/mailu/webmail:2024.06
    container_name: mailu-webmail
    restart: always
    dns: *mailu-dns
    environment:
      <<: *mailu-env
    volumes:
      - ${MAIL_DATA_PATH:-./mail-data}/webmail:/data
      - ${MAIL_DATA_PATH:-./mail-data}/overrides/snappymail:/overrides:ro
    networks:
      mailu_internal:
        aliases:
          - webmail
    depends_on:
      - mailu-imap

networks:
  mailu_internal:
    name: mailu_internal
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.203.0/24
  vhost_network:
    name: vhost_network
    external: true
