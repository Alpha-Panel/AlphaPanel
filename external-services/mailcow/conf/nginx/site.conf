server {
    listen 8080;
    server_name _;

    # SOGo webmail
    location ^~ /SOGo {
        proxy_pass http://mailcow-sogo:20000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 64 512k;
        proxy_busy_buffers_size 512k;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        client_max_body_size 100m;
    }

    # SOGo Microsoft ActiveSync
    location ^~ /Microsoft-Server-ActiveSync {
        proxy_pass http://mailcow-sogo:20000/SOGo/Microsoft-Server-ActiveSync;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        proxy_buffer_size 128k;
        proxy_buffers 64 512k;
        proxy_busy_buffers_size 512k;
        client_max_body_size 100m;
    }

    # SOGo dav (CalDAV/CardDAV)
    location ^~ /.well-known/carddav {
        return 301 /SOGo/dav;
    }
    location ^~ /.well-known/caldav {
        return 301 /SOGo/dav;
    }

    # Mailcow API and admin UI
    location /api/ {
        proxy_pass http://mailcow-php-fpm:9002/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mail autodiscover (Outlook/ActiveSync)
    location /autodiscover/autodiscover.xml {
        proxy_pass http://mailcow-php-fpm:9002/autodiscover/autodiscover.xml;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mail autoconfig (Thunderbird)
    location /mail/config-v1.1.xml {
        proxy_pass http://mailcow-php-fpm:9002/mail/config-v1.1.xml;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — PHP-FPM for Mailcow admin UI
    location / {
        proxy_pass http://mailcow-php-fpm:9002;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100m;
    }
}
