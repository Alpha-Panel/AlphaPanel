include:
  - ${LOCAL_SERVICES_COMPOSE_FILE:-./external-services/local-services.yaml}

services:
  # --- CERTBOT CONTAINERS REMOVED ---
  # SSL certificate management is now handled natively by the AlphaPanel
  # Laravel application via the AcmeService (PHP ACME v2 client).
  # Renewal is managed by the `ssl:renew` artisan command (scheduled twice daily).
  # The certbot-init and certbot-renew containers are no longer needed.

  alpha_panel_web:
    image: alphapanel/frankenphp:local
    pull_policy: never
    container_name: alpha_panel_web
    hostname: ${PANEL_DOMAIN}
    working_dir: /var/www/AlphaPanel/httpdocs
    restart: always
    volumes:
      - ./alpha-panel/web/httpdocs:/var/www/AlphaPanel/httpdocs
      - ./alpha-panel/web/logs:/var/log/caddy
      - ./alpha-panel/web/ssl:/var/www/ssl
      - ./alpha-panel/web/Caddyfile:/etc/frankenphp/Caddyfile
      - ./alpha-panel/web/caddy_data:/data
      - ./alpha-panel/web/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./vhosts:/var/www/vhosts
      - ./acme-challenge:/var/www/acme-challenge
      - ./letsencrypt:/etc/letsencrypt
      - ./secrets/cloudflare.ini:/secrets/cloudflare.ini:ro
      - ./alpha-panel/web/ssh-keys:/root/.ssh:ro
      - ./alpha-panel/supervisor:/etc/supervisor/conf.d:ro
      - ./apache/sites-enabled:/etc/apache2/sites-enabled
      - ./ftp-config/users.env:/etc/users.env
      - ./frankenphp/sites-enabled:/etc/frankenphp-container/sites-enabled
      - ./frankenphp/Caddyfile:/etc/frankenphp-container/Caddyfile
      - ./frankenphp/supervisor:/etc/frankenphp-supervisor
      - ./php-code-server/7.0/fpm.d/:/etc/php/7.0/fpm/pool.d/
      - ./php-code-server/7.1/fpm.d/:/etc/php/7.1/fpm/pool.d/
      - ./php-code-server/7.2/fpm.d/:/etc/php/7.2/fpm/pool.d/
      - ./php-code-server/7.3/fpm.d/:/etc/php/7.3/fpm/pool.d/
      - ./php-code-server/7.4/fpm.d/:/etc/php/7.4/fpm/pool.d/
      - ./php-code-server/8.0/fpm.d/:/etc/php/8.0/fpm/pool.d/
      - ./php-code-server/8.1/fpm.d/:/etc/php/8.1/fpm/pool.d/
      - ./php-code-server/8.2/fpm.d/:/etc/php/8.2/fpm/pool.d/
      - ./php-code-server/8.3/fpm.d/:/etc/php/8.3/fpm/pool.d/
      - ./php-code-server/8.4/fpm.d/:/etc/php/8.4/fpm/pool.d/
      - ./php-code-server/8.5/fpm.d/:/etc/php/8.5/fpm/pool.d/
      - .:/docker_compose_project_root # Mount the Docker Compose project root
    depends_on:
      mysql:
        condition: service_healthy
      alpha_panel_meilisearch:
        condition: service_started
    environment:
      PUBLIC_NETWORK_IP: ${PUBLIC_NETWORK_IP}
      PRIVATE_NETWORK_IP: ${PRIVATE_NETWORK_IP}
      BASE_DOMAIN: ${BASE_DOMAIN}
      PANEL_DOMAIN: ${PANEL_DOMAIN}
      PMA_DOMAIN: ${PMA_DOMAIN}
      CODE_SERVER_DOMAIN: ${CODE_SERVER_DOMAIN}
      VAULTWARDEN_DOMAIN: ${VAULTWARDEN_DOMAIN}
      N8N_DOMAIN: ${N8N_DOMAIN}
      PORTAINER_DOMAIN: ${PORTAINER_DOMAIN}
      JENKINS_DOMAIN: ${JENKINS_DOMAIN:-}
      CF_API_TOKEN: ${CF_API_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      CROWDSEC_LAPI_URL: ${CROWDSEC_LAPI_URL}
      CROWDSEC_DASHBOARD_API_KEY: ${CROWDSEC_DASHBOARD_API_KEY}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-}
      MAIL_WEBMAIL_PANEL_URL: ${MAIL_WEBMAIL_PANEL_URL:-}
      MAIL_ADMIN_PANEL_URL: ${MAIL_ADMIN_PANEL_URL:-}
      ZIMBRA_ENABLED: ${ZIMBRA_ENABLED:-false}
      ZIMBRA_DEFAULT_MX_HOST: ${ZIMBRA_DEFAULT_MX_HOST:-}
      TZ: ${APP_TIMEZONE:-Europe/Istanbul}
    ports:
      - "${PRIVATE_NETWORK_IP}:8443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      vhost_network:
        aliases:
          - ${PANEL_DOMAIN}

  alpha_panel_meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: alpha_panel_meilisearch
    hostname: alpha_panel_meilisearch
    volumes:
      - ./alpha-panel/meilisearch/data:/meili_data
      - ./alpha-panel/meilisearch/tmp:/tmp
    restart: always
    environment:
      - MEILI_ENV=production
      - TMPDIR=/tmp
      - MEILI_MASTER_KEY=${ALPHA_PANEL_MEILISEARCH_MASTER_KEY}
    networks:
      - vhost_network

  frankenphp:
    image: alphapanel/frankenphp:local
    build:
      context: ./frankenphp
      dockerfile: Dockerfile
    container_name: frankenphp
    hostname: frankenphp
    working_dir: /var/www/vhosts
    restart: always
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      PUBLIC_NETWORK_IP: ${PUBLIC_NETWORK_IP}
      PRIVATE_NETWORK_IP: ${PRIVATE_NETWORK_IP}
      BASE_DOMAIN: ${BASE_DOMAIN}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-}
      TZ: ${APP_TIMEZONE:-Europe/Istanbul}
    volumes:
        - ./frankenphp/home:/root
        - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile
        - ./frankenphp/sites-enabled:/etc/frankenphp/sites-enabled
        - ./frankenphp/php.ini:/usr/local/etc/php/php.ini
        - ./frankenphp/supervisor:/etc/supervisor/conf.d:ro
        - ./frankenphp/caddy_data:/data
        - ./frankenphp/waf:/etc/frankenphp/waf
        - ./letsencrypt:/etc/letsencrypt:ro
        - ./acme-challenge:/var/www/acme-challenge
        - ./vhosts:/var/www/vhosts
        - ./ftp-config/users.env:/etc/users.env:ro
        - ./php-code-server/run/:/run/php/
        - ./frankenphp/logs:/var/log/caddy/
        - ./frankenphp/coraza-logs:/var/log/coraza
        - ./frankenphp/_github_hooks_allowlist.caddy:/etc/frankenphp/_github_hooks_allowlist.caddy
        - ./scripts/git-webhook-ip-blocks.sh:/etc/frankenphp/git-webhook-ip-blocks.sh
        - ./php-code-server/7.0/fpm.d/:/etc/php/7.0/fpm/pool.d/
        - ./php-code-server/7.1/fpm.d/:/etc/php/7.1/fpm/pool.d/
        - ./php-code-server/7.2/fpm.d/:/etc/php/7.2/fpm/pool.d/
        - ./php-code-server/7.3/fpm.d/:/etc/php/7.3/fpm/pool.d/
        - ./php-code-server/7.4/fpm.d/:/etc/php/7.4/fpm/pool.d/
        - ./php-code-server/8.0/fpm.d/:/etc/php/8.0/fpm/pool.d/
        - ./php-code-server/8.1/fpm.d/:/etc/php/8.1/fpm/pool.d/
        - ./php-code-server/8.2/fpm.d/:/etc/php/8.2/fpm/pool.d/
        - ./php-code-server/8.3/fpm.d/:/etc/php/8.3/fpm/pool.d/
        - ./php-code-server/8.4/fpm.d/:/etc/php/8.4/fpm/pool.d/
        - ./php-code-server/8.5/fpm.d/:/etc/php/8.5/fpm/pool.d/
        - ./frankenphp/imagick-policy.xml:/etc/ImageMagick-6/policy.xml
    networks:
      - vhost_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      ftp:
        condition: service_started
      memcached:
        condition: service_started
    ports:
      - "${PUBLIC_NETWORK_IP}:80:80"
      - "443:443"

  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.6
    container_name: crowdsec
    restart: unless-stopped
    depends_on:
      - frankenphp
    environment:
      TZ: Europe/Istanbul
      COLLECTIONS: "crowdsecurity/modsecurity crowdsecurity/base-http-scenarios crowdsecurity/http-cve crowdsecurity/caddy crowdsecurity/apache2"
      # Internal agent ↔ LAPI lives on loopback. Cross-container bouncers reach LAPI via crowdsec:8080
      # and MUST authenticate with BOUNCER_KEY_* below — no anonymous decisions.
      LOCAL_API_URL: "http://127.0.0.1:8080"
      DISABLE_AGENT_REGISTRATION: "true"
      BOUNCER_KEY_firewall: ${CROWDSEC_FIREWALL_BOUNCER_KEY}
      BOUNCER_KEY_dashboard: ${CROWDSEC_DASHBOARD_API_KEY}
    volumes:
      - ./crowdsec/config:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      - ./crowdsec/acquis.d:/etc/crowdsec/acquis.d:ro
      - ./frankenphp/coraza-logs:/var/log/coraza:ro
      - ./frankenphp/logs:/var/log/caddy:ro
      - ./vhosts:/var/www/vhosts:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - vhost_network

  php-code-server:
    build:
      context: ./php-code-server
      dockerfile: Dockerfile
    container_name: php-code-server
    hostname: php-code-server
    dns:
      - 1.1.1.1
      - 1.0.0.1
    restart: always
    user: root
    security_opt:
      - no-new-privileges:true
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - SUDO_PASSWORD=${CODE_SERVER_SUDO_PASSWORD}
      - PROXY_DOMAIN=${CODE_SERVER_DOMAIN}:7443
      - DEFAULT_WORKSPACE=/var/www/vhosts
      - TZ=${APP_TIMEZONE:-Europe/Istanbul}
      - ALLOW_ROOT=true
    volumes:
      - ./php-code-server/run/:/run/php/
      - ./vhosts:/var/www/vhosts
      - ./php-code-server/supervisor.d:/etc/supervisor/conf.d/

      - ./php-code-server/7.0/fpm.d/:/etc/php/7.0/fpm/pool.d/
      - ./php-code-server/7.1/fpm.d/:/etc/php/7.1/fpm/pool.d/
      - ./php-code-server/7.2/fpm.d/:/etc/php/7.2/fpm/pool.d/
      - ./php-code-server/7.3/fpm.d/:/etc/php/7.3/fpm/pool.d/
      - ./php-code-server/7.4/fpm.d/:/etc/php/7.4/fpm/pool.d/
      - ./php-code-server/8.0/fpm.d:/etc/php/8.0/fpm/pool.d/
      - ./php-code-server/8.1/fpm.d:/etc/php/8.1/fpm/pool.d/
      - ./php-code-server/8.2/fpm.d:/etc/php/8.2/fpm/pool.d/
      - ./php-code-server/8.3/fpm.d:/etc/php/8.3/fpm/pool.d/
      - ./php-code-server/8.4/fpm.d/:/etc/php/8.4/fpm/pool.d/
      - ./php-code-server/8.5/fpm.d/:/etc/php/8.5/fpm/pool.d/

      - ./php-code-server/7.0/php.ini:/etc/php/7.0/fpm/php.ini
      - ./php-code-server/7.1/php.ini:/etc/php/7.1/fpm/php.ini
      - ./php-code-server/7.2/php.ini:/etc/php/7.2/fpm/php.ini
      - ./php-code-server/7.3/php.ini:/etc/php/7.3/fpm/php.ini
      - ./php-code-server/7.4/php.ini:/etc/php/7.4/fpm/php.ini
      - ./php-code-server/8.0/php.ini:/etc/php/8.0/fpm/php.ini
      - ./php-code-server/8.1/php.ini:/etc/php/8.1/fpm/php.ini
      - ./php-code-server/8.2/php.ini:/etc/php/8.2/fpm/php.ini
      - ./php-code-server/8.3/php.ini:/etc/php/8.3/fpm/php.ini
      - ./php-code-server/8.4/php.ini:/etc/php/8.4/fpm/php.ini
      - ./php-code-server/8.5/php.ini:/etc/php/8.5/fpm/php.ini

      - ./ftp-config/users.env:/etc/users.env:ro
      - ./code-server/data:/root

      - ./apache/sites-enabled:/etc/apache2/sites-enabled
      - ./apache/conf-enabled/remote_ip.conf:/etc/apache2/conf-enabled/remote_ip.conf
      - ./apache/conf-enabled/cloudflare.conf:/etc/apache2/conf-enabled/cloudflare.conf
      - ./apache/conf-enabled/security.conf:/etc/apache2/conf-enabled/security.conf
      - ./apache/conf-enabled/deflate.conf:/etc/apache2/conf-enabled/deflate.conf
      - ./vhosts:/var/www/vhosts
      - ./php-code-server/run/:/run/php/
      - ./deploy_cache:/deploy_cache
      - /root/backup:/root/backup
      - ./scripts/backup:/opt/backup
      - ./frankenphp/imagick-policy.xml:/etc/ImageMagick-6/policy.xml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      ftp:
        condition: service_started
      memcached:
        condition: service_started
    networks:
      - vhost_network

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: meilisearch
    hostname: meilisearch
    volumes:
      - ./meilisearch/data:/meili_data
      - ./meilisearch/tmp:/tmp
    restart: always
    environment:
      - MEILI_ENV=production
      - TMPDIR=/tmp
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    ports:
      - "${PRIVATE_NETWORK_IP}:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vhost_network

  mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: mysql
    hostname: db
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE:-Europe/Istanbul}
    ports:
      - "${PRIVATE_NETWORK_IP}:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vhost_network

  powerdns:
    image: powerdns/pdns-auth-49:4.9.13
    container_name: powerdns
    hostname: powerdns
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PUBLIC_NETWORK_IP}:53:53/tcp"
      - "${PUBLIC_NETWORK_IP}:53:53/udp"
    volumes:
      - ./powerdns/pdns.conf:/etc/powerdns/pdns.conf
    command: ["--gmysql-password=${MYSQL_ROOT_PASSWORD}"]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vhost_network

  redis:
    image: redis:7.4.8-alpine
    container_name: redis
    hostname: redis.niyazi.org
    restart: always
    # 2026-06-10 security audit (H-10): require a password when REDIS_PASSWORD is set.
    # Conditional so existing installs without the var keep working until they set it.
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --requirepass \"$$REDIS_PASSWORD\" --save 60 1; else exec redis-server --save 60 1; fi"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - ./redis:/data
    ports:
      - "${PRIVATE_NETWORK_IP}:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - vhost_network

  memcached:
    image: memcached:1.6.41-alpine
    container_name: memcached
    restart: always
    networks:
      - vhost_network

  password:
    image: "vaultwarden/server:1.35.4-alpine"
    hostname: "${VAULTWARDEN_DOMAIN}"
    container_name: password
    restart: always
    volumes:
      - "./vaultwarden/data:/data/"
    environment:
      - "DATABASE_URL=mysql://${VAULTWARDEN_DB_USER}:${VAULTWARDEN_DB_PASSWORD}@${VAULTWARDEN_DB_HOST}/${VAULTWARDEN_DB_NAME}"
      - "RUST_BACKTRACE=1"
    networks:
      - vhost_network

  phpmyadmin:
    image: phpmyadmin:5.2.3
    container_name: phpmyadmin
    hostname: ${PMA_DOMAIN}
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 2G
      #PMA_USER: root
      #PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PMA_BLOWFISH_SECRET: ${PMA_BLOWFISH_SECRET}
      PANEL_DB_HOST: ${PANEL_DB_HOST:-mysql}
      PANEL_DB_PORT: ${PANEL_DB_PORT:-3306}
      PANEL_DB_FALLBACK_HOST: ${PRIVATE_NETWORK_IP}
      PANEL_DB_NAME: ${PANEL_DB_NAME}
      PANEL_DB_USER: ${PANEL_DB_USER}
      PANEL_DB_PASS: ${PANEL_DB_PASS}
      PMA_URL: ${PMA_URL}
      PMA_SIGNON_BOOTSTRAP_URL: https://${PANEL_DOMAIN}:8443/pma/admin/sso
      PMA_SSO_ENFORCE_IP: ${PMA_SSO_ENFORCE_IP:-0}
      PMA_SSO_SINGE_USE: ${PMA_SSO_SINGLE_USE:-0}
      PANEL_APP_KEY: ${PANEL_APP_KEY}
    volumes:
      - ./phpmyadmin/config.inc.php:/etc/phpmyadmin/config.inc.php:ro
      - ./phpmyadmin/signon.php:/var/www/html/signon.php:ro
    networks:
      - vhost_network

  ftp:
    image: serversideup/proftpd:v1.0.2
    container_name: ftp-server
    hostname: ftp-server
    restart: always
    ports:
      - "${PRIVATE_NETWORK_IP}:21:21"                        # komut kanalı (FTPS explicit)
      - "${PRIVATE_NETWORK_IP}:990:990"                      # FTPS implicit
      - "${PRIVATE_NETWORK_IP}:${FTP_PASSIVE_PORT_RANGE_START:-21000}-${FTP_PASSIVE_PORT_RANGE_END:-21099}:${FTP_PASSIVE_PORT_RANGE_START:-21000}-${FTP_PASSIVE_PORT_RANGE_END:-21099}"
    environment:
      FTP_MASQUERADE_ADDRESS: ${PRIVATE_NETWORK_IP}
      FTP_TLS_REQUIRED: "on"
      FTP_TLS_CERTIFICATE_FILE: /etc/letsencrypt/live/${BASE_DOMAIN}/fullchain.pem
      FTP_TLS_CERTIFICATE_KEY_FILE: /etc/letsencrypt/live/${BASE_DOMAIN}/privkey.pem
      FTP_PASSIVE_PORT_RANGE_START: ${FTP_PASSIVE_PORT_RANGE_START:-21000}
      FTP_PASSIVE_PORT_RANGE_END: ${FTP_PASSIVE_PORT_RANGE_END:-21099}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ftp_reader
      MYSQL_PASSWORD: ${FTP_MYSQL_PASSWORD}
      MYSQL_PORT: 3306
      FTP_SQL_USERS_TABLE: ftp_users
    volumes:
      - ./vhosts:/var/www/vhosts:rw
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./ftp-config/proftpd.conf:/etc/proftpd/proftpd.conf:ro
      - ./ftp-logs:/var/log/proftpd
    networks:
      - vhost_network
    depends_on:
      mysql:
        condition: service_healthy

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    hostname: ${JENKINS_DOMAIN:-jenkins.example.com}
    user: jenkins
    group_add:
        - "988"
    restart: unless-stopped
    environment:
      - TZ=Europe/Istanbul
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ./jenkins/data:/var/jenkins_home
      - ./vhosts:/var/www/vhosts
      - ./ftp-config/users.env:/etc/users.env:ro
      - ./deploy_cache:/deploy_cache
    networks:
      - vhost_network

  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRESQL_USER}"
      POSTGRES_PASSWORD: "${POSTGRESQL_PASSWORD}"
      POSTGRES_DB: n8n
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER} -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - n8n_internal

  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    restart: always
    group_add:
      - "988"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PRIVATE_NETWORK_IP}:5678:5678"
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      NODES_EXCLUDE: "[]"
      TZ: Europe/Istanbul
      # DB (kalıcı)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: "${POSTGRESQL_USER}"
      DB_POSTGRESDB_PASSWORD: "${POSTGRESQL_PASSWORD}"
      # n8n verisi (credentials, encryption key vs.)
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"
      N8N_USER_FOLDER: /home/node/.n8n

      N8N_EMAIL_MODE: "${N8N_EMAIL_MODE}"
      N8N_SMTP_HOST: "${N8N_SMTP_HOST}"
      N8N_SMTP_PORT: "${N8N_SMTP_PORT}"
      N8N_SMTP_USER: "${N8N_SMTP_USER}"
      N8N_SMTP_PASS: "${N8N_SMTP_PASS}"
      N8N_SMTP_SENDER: "${N8N_SMTP_SENDER}"
      N8N_SMTP_SSL: "${N8N_SMTP_SSL}"
      # URL / Reverse proxy kullanıyorsan aç
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PROTOCOL: https
      N8N_PORT: 8443
      WEBHOOK_URL: https://${N8N_DOMAIN}:8443/
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}:8443/
      # İstersen basic auth
      # N8N_BASIC_AUTH_ACTIVE: "true"
      # N8N_BASIC_AUTH_USER: "admin"
      # N8N_BASIC_AUTH_PASSWORD: "CHANGE_ME"
      # Log
      # N8N_LOG_LEVEL: info
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/files:/files
      - ./vhosts:/var/www/vhosts/
      - /root/backup:/home/node/backup
    networks:
      - vhost_network
      - n8n_internal

  portainer:
    image: portainer/portainer-ce:2.39.1
    restart: always
    container_name: portainer
    environment:
      - TRUSTED_ORIGINS=${PORTAINER_DOMAIN}
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    ports:
      - "${PRIVATE_NETWORK_IP}:8000:8000"
      - "${PRIVATE_NETWORK_IP}:9000:9000"
    volumes:
      - ./portainer:/data
    networks:
      - vhost_network

  portainer_agent:
    image: portainer/agent:2.39.1-alpine
    container_name: portainer-agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - vhost_network

  update-agent:
    build:
      context: ./update-agent
      dockerfile: Dockerfile
    container_name: update-agent
    restart: always
    environment:
      UPDATE_AGENT_SECRET: ${UPDATE_AGENT_SECRET}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${PANEL_DB_USER}
      MYSQL_PASSWORD: ${PANEL_DB_PASS}
      MYSQL_HOST: mysql
      GITHUB_REPO: ${PANEL_GITHUB_REPO:-Alpha-Panel/AlphaPanel}
      PROJECT_ROOT: /project
      MYSQL_UPDATE_CHECK: ${MYSQL_UPDATE_CHECK:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    networks:
      - vhost_network

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      EXEC: 1
      POST: 1
      NETWORKS: 1
      VOLUMES: 1
      SERVICES: 0
      TASKS: 0
      NODES: 0
      SYSTEM: 0
      AUTH: 0
      BUILD: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vhost_network

networks:

  vhost_network:
    name: vhost_network
    driver: bridge

  # Internal-only network for n8n ↔ postgres. Hosted user sites on vhost_network
  # cannot reach the n8n DB. n8n itself joins both networks for ingress + DB access.
  n8n_internal:
    name: n8n_internal
    driver: bridge
    internal: true
