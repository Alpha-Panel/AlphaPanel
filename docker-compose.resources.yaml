# ─── Per-Service Resource Limits ────────────────────────────
#
# Bu dosya varsayılan olarak DEVRE DIŞIDIR.
# Aktif etmek için .env dosyasına ekleyin:
#   COMPOSE_FILE=docker-compose.yaml:docker-compose.resources.yaml
#
# Ardından limit değerlerini .env'de özelleştirin.
# Varsayılan değerler 6 CPU / 12 GB RAM sunucu için optimize edilmiştir.

services:
  frankenphp:
    deploy:
      resources:
        limits:
          cpus: "${FRANKENPHP_CPU_LIMIT:-2.0}"
          memory: "${FRANKENPHP_MEM_LIMIT:-3G}"

  alpha_panel_web:
    deploy:
      resources:
        limits:
          cpus: "${ALPHA_PANEL_CPU_LIMIT:-1.5}"
          memory: "${ALPHA_PANEL_MEM_LIMIT:-2G}"

  php-code-server:
    deploy:
      resources:
        limits:
          cpus: "${CODE_SERVER_CPU_LIMIT:-1.5}"
          memory: "${CODE_SERVER_MEM_LIMIT:-2G}"

  mysql:
    deploy:
      resources:
        limits:
          cpus: "${MYSQL_CPU_LIMIT:-1.5}"
          memory: "${MYSQL_MEM_LIMIT:-3G}"

  redis:
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: "${REDIS_MEM_LIMIT:-512M}"

  alpha_panel_meilisearch:
    deploy:
      resources:
        limits:
          cpus: "${ALPHA_PANEL_MEILISEARCH_CPU_LIMIT:-0.5}"
          memory: "${ALPHA_PANEL_MEILISEARCH_MEM_LIMIT:-512M}"

  meilisearch:
    deploy:
      resources:
        limits:
          cpus: "${MEILISEARCH_CPU_LIMIT:-0.5}"
          memory: "${MEILISEARCH_MEM_LIMIT:-512M}"

  n8n:
    deploy:
      resources:
        limits:
          cpus: "${N8N_CPU_LIMIT:-1.0}"
          memory: "${N8N_MEM_LIMIT:-1G}"

  crowdsec:
    deploy:
      resources:
        limits:
          cpus: "${CROWDSEC_CPU_LIMIT:-0.5}"
          memory: "${CROWDSEC_MEM_LIMIT:-512M}"

  portainer:
    deploy:
      resources:
        limits:
          cpus: "${PORTAINER_CPU_LIMIT:-0.5}"
          memory: "${PORTAINER_MEM_LIMIT:-256M}"

  ftp:
    deploy:
      resources:
        limits:
          cpus: "${FTP_CPU_LIMIT:-0.25}"
          memory: "${FTP_MEM_LIMIT:-128M}"

  memcached:
    deploy:
      resources:
        limits:
          cpus: "${MEMCACHED_CPU_LIMIT:-0.5}"
          memory: "${MEMCACHED_MEM_LIMIT:-256M}"

  password:
    deploy:
      resources:
        limits:
          cpus: "${VAULTWARDEN_CPU_LIMIT:-0.5}"
          memory: "${VAULTWARDEN_MEM_LIMIT:-256M}"

  phpmyadmin:
    deploy:
      resources:
        limits:
          cpus: "${PMA_CPU_LIMIT:-0.5}"
          memory: "${PMA_MEM_LIMIT:-512M}"

  postgres:
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-0.5}"
          memory: "${POSTGRES_MEM_LIMIT:-512M}"
