[program:alphapanel-schedule]
process_name=%(program_name)s
command=/usr/local/bin/php /var/www/AlphaPanel/httpdocs/artisan schedule:work
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/AlphaPanel/httpdocs/storage/logs/schedule.log
stopwaitsecs=10
startsecs=0
