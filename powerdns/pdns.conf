# PowerDNS Authoritative Server Configuration
# Backend: MySQL (gmysql) - shares the existing MySQL service

launch=gmysql

# MySQL connection
gmysql-host=mysql
gmysql-port=3306
gmysql-dbname=${MYSQL_DATABASE:-alpha_panel}
gmysql-user=root
gmysql-password=${MYSQL_ROOT_PASSWORD}

# Use custom table names with pdns_ prefix
gmysql-domains-table=pdns_domains
gmysql-records-table=pdns_records
gmysql-supermasters-table=pdns_supermasters
gmysql-domainmetadata-table=pdns_domainmetadata

# Server settings
local-address=0.0.0.0
local-port=53
daemon=no
guardian=no
setgid=pdns
setuid=pdns

# Disable API (we write directly to MySQL)
api=no
webserver=no

# Security: authoritative only, no recursion
allow-recursion=no
disable-axfr=yes

# Logging
loglevel=4
log-dns-details=no
log-dns-queries=no

# SOA defaults
default-soa-content=ns1.example.com admin.example.com 0 10800 3600 604800 3600
