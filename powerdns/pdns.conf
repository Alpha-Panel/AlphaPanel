# PowerDNS Authoritative Server Configuration
# Backend: MySQL (gmysql) - separate database on shared MySQL service

launch=gmysql

# MySQL connection - uses dedicated 'powerdns' database
gmysql-host=mysql
gmysql-port=3306
gmysql-dbname=powerdns
gmysql-user=root

# Server settings
local-address=0.0.0.0
local-port=53
daemon=no
guardian=no
setgid=pdns
setuid=pdns

# Disable API (we write directly to MySQL)
api=no
webserver=no

# Security: authoritative only, disable zone transfers
disable-axfr=yes

# Logging
loglevel=4
log-dns-details=no
log-dns-queries=no

# SOA defaults
default-soa-content=ns1.example.com admin.example.com 0 10800 3600 604800 3600
